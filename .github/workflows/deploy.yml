name: Deploy to Render

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Trigger Render deploy webhook
        run: curl -s -X POST "https://api.render.com/deploy/srv-d7ak6l6a2pns73afj1g0?key=4G9IZVgholQ"
