name: Build + Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          URL="${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          if [ -z "$URL" ]; then
            URL="https://api.render.com/deploy/srv-d7ak6l6a2pns73afj1g0?key=4G9IZVgholQ"
          fi
          curl -s -X POST "$URL"
      - name: Trigger Vercel deploy
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -s -X POST "$HOOK"
          else
            echo "VERCEL_DEPLOY_HOOK_URL no configurado — salteando Vercel"
          fi
