name: Build + Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            vercel --token "$VERCEL_TOKEN" --prod --yes
            echo "✅ Deploy a Vercel completado"
          else
            echo "⚠️ Secrets de Vercel no configurados. Verificando hook URL..."
            HOOK="${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
            if [ -n "$HOOK" ]; then
              curl -s -X POST "$HOOK"
              echo "✅ Vercel deploy hook disparado"
            else
              echo "ℹ️ No hay credenciales de Vercel - el deploy se hará via integración GitHub automática"
            fi
          fi

      - name: Trigger Render deploy (backup)
        run: |
          URL="${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          if [ -z "$URL" ]; then
            URL="https://api.render.com/deploy/srv-d7ak6l6a2pns73afj1g0?key=4G9IZVgholQ"
          fi
          curl -s -X POST "$URL" || true
          echo "✅ Render deploy triggered"
