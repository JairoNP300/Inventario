
services:
  - type: web
    name: ventas-inventario-minimal
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "node server-minimal.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: ${DATABASE_URL}
    healthCheckPath: /api

databases:
  - name: ventas-inventario-db
    databaseName: ventas_inventario
    user: ventas_user
